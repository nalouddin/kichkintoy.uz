version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: kichkintoy_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kichkintoy
      POSTGRES_PASSWORD: kichkintoy
      POSTGRES_DB: kichkintoy_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kichkintoy"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kichkintoy_redis
    restart: unless-stopped

  backend:
    build: .
    container_name: kichkintoy_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://kichkintoy:kichkintoy@postgres:5432/kichkintoy_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

volumes:
  postgres_data:
