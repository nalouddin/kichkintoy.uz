services:
  postgres:
    image: postgres:15-alpine
    container_name: kichkintoy_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kichkintoy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-kichkintoy_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kichkintoy}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kichkintoy_redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  backend:
    build: .
    container_name: kichkintoy_backend
    restart: always
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-kichkintoy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kichkintoy_db}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-kichkintoy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kichkintoy_db}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"

  nginx:
    image: nginx:alpine
    container_name: kichkintoy_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/web:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  postgres_data:
